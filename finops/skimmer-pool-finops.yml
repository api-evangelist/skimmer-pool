- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Skimmer spend. Skimmer is a subscription SaaS billed per
  serviced location per month ($1/location on Getting Started with a $49 minimum;
  $2/location on Scaling Up with a $98 minimum). The Public API is not metered as
  its own line item and has no usage-based API fee; instead it is a capability
  bundled into the custom-priced Enterprise ("Owning the Market") tier. So the
  dominant cost driver is the count of active serviced locations, not API call
  volume - the 500 req/min rate limit is an operational guardrail rather than a
  billing meter.
notes: >-
  Enterprise/API pricing is negotiated with Skimmer sales and not published;
  reconcile the actual contract value at onboarding. Per-location list prices are
  from the public pricing page and may change.
sources:
- https://www.getskimmer.com/pricing
