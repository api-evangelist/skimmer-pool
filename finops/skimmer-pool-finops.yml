  PricingCategory: Subscription-Based
meters:
- name: serviced_locations
  description: Active serviced locations per month; the primary Skimmer billing unit.
  unit: locations
  aggregation: sum
  dimensions:
  - account
  - plan
- name: api_requests
  description: >-
    Public API requests. Not a billing meter; capped at 500/min per key as an
    operational guardrail on the Enterprise tier.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - api-key
principles:
- name: Visibility
  description: >-
    Track active serviced-location counts per account and plan, since that -
    not API traffic - drives the monthly invoice.
- name: Allocation
  description: >-
    Map serviced locations to internal branches/regions so subscription cost
    attributes to the right cost centers.
- name: Optimization
  description: >-
    Deactivate stale customers/locations promptly (the API's Activate /
    Deactivate endpoints help) so you are not billed for locations no longer
    serviced; confirm whether the Enterprise tier is justified by integration
    value before upgrading for API access.
- name: Accountability
  description: >-
    Assign an owner to the Skimmer subscription and review location counts and
    Enterprise contract terms each billing cycle.
