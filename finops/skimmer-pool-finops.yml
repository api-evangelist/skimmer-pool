publisherName: Skimmer
serviceCategory: Business Application Software
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: Skimmer
  ServiceCategory: Business Application Software
  ProviderName: Skimmer
  PublisherName: Skimmer
  InvoiceIssuerName: Skimmer
  BillingCurrency: USD
