  endpointsModeled: |
    Path names, HTTP methods, the base URL, the skimmer-api-key auth header, and
    the Sieve-style search parameters above are taken from Skimmer's public
    developer portal. Request/response BODY schemas in openapi/ are MODELED by
    API Evangelist - Skimmer does not publish a machine-readable OpenAPI
    document publicly and full field-level schemas are behind sales-led
    onboarding.
