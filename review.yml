actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    Skimmer's own public API is request/response REST (base
    https://publicapi.getskimmer.com, skimmer-api-key header). No WebSocket or
    other server-push transport is documented, so no AsyncAPI document was
    created. A modeled OpenAPI, plans, rate-limits, finops, and a Postman
    collection were authored from the public developer portal instead.
