aid: skimmer-pool
name: Skimmer
review:
  question: Does Skimmer expose a documented public WebSocket API?
  answer: false
  date: '2026-07-04'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Skimmer's public API is a request/response
    REST API over HTTPS at https://publicapi.getskimmer.com. There is no
    server-push transport (WebSocket or SSE) documented on Skimmer's developer
    portal to model. Reads are done by polling the REST resource and search
    endpoints; there is no realtime or bidirectional channel published.
findings:
  summary: |
    Skimmer DOES expose a real, documented public API - but it is REST, not
    WebSocket. Skimmer is pool-service business management software. Its Public
    API is served from https://publicapi.getskimmer.com and documented on a
    Zudoku-based developer portal at https://devportal.getskimmer.com. Every
    request is authenticated with a per-account key sent in the `skimmer-api-key`
    header. The API is rate limited to 500 requests per minute per key (429 +
    Retry-After on overage). Access is sales-led and Enterprise-only: the API is
    included solely on Skimmer's top "Owning the Market" / "Skimmer for
    Enterprise" tier and is provisioned by Skimmer's sales team, not through
    self-service signup. No WebSocket (ws:// or wss://) endpoint is documented
    anywhere on Skimmer's portal as of the review date.
  publicApi: |
    Yes - documented and public-facing (portal is open), though gated for use.
    Resources observed on the developer portal: Customers (+ CustomerActivityLogs),
    BodiesOfWater, ServiceLocations, WorkOrders (+ WorkOrderTypes), Routes,
    Invoices, Billing, Quotes, Products (+ ProductCategories, prices), Users,
    plus supporting types (LeadSources, DosageTypes, InstalledItems). Most
    resources offer full CRUD; several offer a Sieve-style /search route with
    sorts, filters, page, and pageSize parameters.
  accessModel: |
    Sales-led / partner-style. Not plug-and-play, no app-store install, no
    self-service key issuance. Available on the Enterprise tier only (custom
    pricing, aimed at operations servicing 1,000+ pools/month). Prospects contact
    sales@getskimmer.com or (855) 452-1737.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://publicapi.getskimmer.com
      documented: true
      note: Request/response REST. Auth via skimmer-api-key header. 500 req/min per key.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented on Skimmer's developer portal as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No server-sent-events streaming surface is documented.
