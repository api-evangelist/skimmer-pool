  humanURL: https://devportal.getskimmer.com/api/products
  baseURL: https://publicapi.getskimmer.com
  properties:
  - url: https://devportal.getskimmer.com/api/products
    type: APIReference
  - url: openapi/skimmer-pool-openapi.yml
    type: OpenAPI
  description: Full CRUD and search over the product catalog and product categories,
    plus a dedicated bulk price-update endpoint (Products/prices) for maintaining the
    prices of chemicals, parts, and other line items.
- aid: skimmer-pool:skimmer-users-api
  name: Skimmer Users API
  tags:
  - Users
  - Technicians
  - Accounts
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://devportal.getskimmer.com/api/users
  baseURL: https://publicapi.getskimmer.com
  properties:
  - url: https://devportal.getskimmer.com/api/users
    type: APIReference
  - url: openapi/skimmer-pool-openapi.yml
    type: OpenAPI
  description: Retrieve all users on the Skimmer account - owners, admins, and
    technicians - with their identifiers, names, contact details, role, and active
    status, so integrations can map technicians to routes and work orders.
